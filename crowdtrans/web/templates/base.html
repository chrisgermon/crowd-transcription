<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CrowdScription{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12' fill='%237c3aed'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="h-full">
    <nav class="bg-indigo-700 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-white font-bold text-xl tracking-tight">CrowdScription</a>
                    <a href="/dashboard" class="text-indigo-100 hover:text-white text-sm font-medium">Dashboard</a>
                    <a href="/worklist/" class="text-indigo-100 hover:text-white text-sm font-medium">Worklist</a>
                    <a href="/voice/" class="text-indigo-100 hover:text-white text-sm font-medium">Voice</a>
                    <a href="/transcriptions/" class="text-indigo-100 hover:text-white text-sm font-medium">Transcriptions</a>
                    <a href="/compare/" class="text-indigo-100 hover:text-white text-sm font-medium">Compare</a>
                    <a href="/learning/" class="text-indigo-100 hover:text-white text-sm font-medium">Learning</a>
                    <a href="/settings/" class="text-indigo-100 hover:text-white text-sm font-medium">Settings</a>
                </div>
                <div class="flex items-center space-x-4">
                    {% if request.session.get("user") %}
                    <span class="text-indigo-200 text-xs">{{ request.session["user"]["display_name"] }}</span>
                    <a href="/logout" class="text-indigo-300 hover:text-white text-xs font-medium">Logout</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="{% block main_classes %}max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
